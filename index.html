/* ====================== CSV HELPERS ====================== */
function detectDelim(line){ const c=(line.match(/;/g)||[]).length, k=(line.match(/,/g)||[]).length; return c>=k?';':','; }
function parseCSV(text){
  text=text.replace(/^﻿/,'');
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
  if(!lines.length) return {headers:[],rows:[]};
  const delim=detectDelim(lines[0]);
  const split=(line)=>{ const out=[];let cur='';let q=false;
    for(let i=0;i<line.length;i++){const ch=line[i];
      if(ch==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
      else if(ch===delim&&!q){out.push(cur);cur='';}
      else cur+=ch; }
    out.push(cur); return out.map(s=>s.trim()); };
  const headers=split(lines[0]).map(h=>h.toLowerCase());
  const rows=lines.slice(1).map(split);
  return {headers,rows,delim};
}
// flexible column finder — strips spaces, punctuation, parentheses; keeps umlauts
function col(headers,...cands){
  const norm=s=>(s||'').toLowerCase().replace(/[^a-z0-9äöüß]/g,'');
  for(const cand of cands){
    const nc=norm(cand);
    const i=headers.findIndex(h=>norm(h).includes(nc));
    if(i>=0) return i;
  }
  return -1;
}
function normName(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z]/g,''); }
function normDate(s){ // -> YYYY-MM-DD
  if(!s) return '';
  s=s.trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})/);
  if(m){let y=m[3];if(y.length===2)y='20'+y;return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}
  return s;
}
function downloadFile(name,content,type='text/csv;charset=utf-8'){

}

/* ====================== MATCHING LOGIC ====================== */
function buildMapping(students, asvList){
  // index asv by old id and by name+date
  const asvByOld={}, asvByKey={};
  asvList.forEach(a=>{
    if(a.old_id) asvByOld[String(a.old_id).trim()]=a;
    const k=normName(a.last_name)+'|'+normName(a.first_name)+'|'+normDate(a.birth_date);
    (asvByKey[k]=asvByKey[k]||[]).push(a);
  });
  return students.map(s=>{
    const r={...s};
    r.asv_id=''; r.match_status='missing_asv'; r.match_note='';
    if(!s.old_external_id){ r.no_old_id=true; } else { r.no_old_id=false; }
    // 1) match via old id
    if(s.old_external_id && asvByOld[String(s.old_external_id).trim()]){
      const a=asvByOld[String(s.old_external_id).trim()];
      r.asv_id=a.asv_id; r.match_status='matched_id'; r.eltern1=a.eltern1; r.eltern2=a.eltern2; return r;
    }
    // 2) match via name+birthdate
    const k=normName(s.last_name)+'|'+normName(s.first_name)+'|'+normDate(s.birth_date);
    const hits=asvByKey[k]||[];
    if(hits.length===1){ r.asv_id=hits[0].asv_id; r.match_status='matched_name'; r.eltern1=hits[0].eltern1; r.eltern2=hits[0].eltern2; }
    else if(hits.length>1){ r.match_status='conflict'; r.match_note=hits.length+' ASV-Treffer (mehrdeutig)'; }
    else { r.match_status='missing_asv'; r.match_note='kein ASV-Treffer'; }
    return r;
  });
}

/* ====================== APP ====================== */
function App(){
  const [view,setView]=useState('dashboard');
  const [data,setData]=useState(DataService.load());
  const [cfg,setCfg]=useState(DataService.cfg());
  const [session,setSession]=useState(null);
  const [busy,setBusy]=useState(false);
  const mode = session ? 'live' : 'demo';

  useEffect(()=>{DataService.save(data);},[data]);
  useEffect(()=>{DataService.saveCfg(cfg);},[cfg]);
  useEffect(()=>{
    DataService.session().then(s=>setSession(s)).catch(()=>{});
    const sub=DataService.onAuth(s=>setSession(s));
    return ()=>{ try{sub.data.subscription.unsubscribe();}catch(e){} };
  },[]);

  // NUR Login-Status (kein Roster-Klartext) — Roster bleibt lokal (Tresor-Regel)
  const pullFromCloud=async()=>{
    setBusy(true);
    try{
      const rows=await DataService.pullStatus();
      const map={}; rows.forEach(r=>{ if(r.username) map[r.username.toLowerCase()]={login:!!r.login,last:r.last_login||''}; });
      setData(d=>({...d,students:(d.students||[]).map(s=>{const h=map[(s.username||'').toLowerCase()];return h?{...s,login:h.login,last_login:h.last}:s;})}));
      toast('Login-Status aus Cloud geladen ('+rows.length+')','success');
    }catch(e){ toast(e.code==='42P01'?'Status-Tabelle fehlt — bitte SQL ausführen':'Laden fehlgeschlagen: '+(e.message||e.code),'error'); }
    setBusy(false);
  };
  const pushToCloud=async()=>{
    if(!confirm('Nur den Login-Status (Benutzername, Klasse, eingeloggt-ja/nein, letzte Anmeldung) in die Cloud schreiben?\n\nKeine Namen, Geburtsdaten, Eltern-Mails oder IDs — der Roster bleibt lokal.')) return;
    setBusy(true);
    try{ const n=await DataService.pushStatus(data.students); toast('Login-Status in Cloud gespeichert ('+n+')','success'); }
    catch(e){ toast(e.code==='42P01'?'Status-Tabelle fehlt — bitte SQL ausführen':'Speichern fehlgeschlagen: '+(e.message||e.code),'error'); }
    setBusy(false);
  };

  const mapped=useMemo(()=>buildMapping(data.students||[], data.asv||[]),[data]);
  const stats=useMemo(()=>{
    const total=mapped.length;
    const ready=mapped.filter(m=>m.match_status==='matched_id'||m.match_status==='matched_name').length;
    const conflicts=mapped.filter(m=>m.match_status==='conflict').length;
    const noAsv=mapped.filter(m=>m.match_status==='missing_asv').length;
    const noOld=mapped.filter(m=>m.no_old_id).length;
    const loggedIn=(data.students||[]).filter(s=>s.login).length;
    return {total,ready,conflicts,noAsv,noOld,loggedIn};
  },[mapped,data]);

  const nav=(id,label,badge,badgeOk)=>html`
    <div class=${'nav-item'+(view===id?' active':'')} onClick=${()=>{setView(id);document.querySelector('.sidebar').classList.remove('open');}}>
      <span>${label}</span>
      ${badge!=null&&badge!==0?html`<span class=${'nav-badge'+(badgeOk?' ok':'')}>${badge}</span>`:''}
    </div>`;

  return html`
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-badge"><span class="k">K</span><span class="r">R</span><span class="s">S</span></div>
        <div class="sidebar-title">Untis-Migrations-Zentrale</div>
        <div class="sidebar-subtitle">Umzug auf die ASV-BW-Schüler-ID</div>
      </div>
      <div class=${'mode-pill '+(mode==='live'?'mode-live':'mode-demo')}>${mode==='live'?'● Supabase verbunden':'● Demo / lokal'}</div>
      <div class="nav-section">Überblick</div>
      ${nav('dashboard','📊 Dashboard')}
      ${nav('overview','📋 Schülerübersicht',stats.total)}
      ${nav('login','🔑 Login-Status',stats.loggedIn,true)}
      <div class="nav-section">Migration</div>
      ${nav('import','📥 Daten importieren')}
      ${nav('conflicts','⚠️ Konflikte',stats.conflicts+stats.noAsv)}
      ${nav('export','⬇️ Import-CSV erzeugen',stats.ready,true)}
      <div class="nav-section">Hilfe</div>
      ${nav('anleitung','📖 Anleitung')}
      <div class="nav-section">System</div>
      ${nav('admin','⚙️ Admin-Zentrale')}
    </aside>
    <main class="main">
      <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        ${session?html`
          <span class="pill pill-success">● Supabase · ${session.user.email}</span>
          <span class="pill pill-info" title="Roster bleibt lokal — Cloud nur für Login-Status">🔒 Roster lokal</span>
          <button class="btn btn-secondary btn-small" disabled=${busy} onClick=${pullFromCloud}>⬇️ Status laden</button>
          <button class="btn btn-accent btn-small" disabled=${busy} onClick=${pushToCloud}>⬆️ Status speichern</button>
        `:html`<span class="pill pill-muted">● Lokal (nicht angemeldet)</span>`}
      </div>
      ${view==='dashboard'&&html`<${Dashboard} stats=${stats} mapped=${mapped} data=${data} setData=${setData} setView=${setView}/>`}
      ${view==='overview'&&html`<${Overview} mapped=${mapped}/>`}
      ${view==='login'&&html`<${LoginStatus} data=${data} setData=${setData} cfg=${cfg}/>`}
      ${view==='import'&&html`<${ImportView} data=${data} setData=${setData}/>`}
      ${view==='conflicts'&&html`<${Conflicts} mapped=${mapped} data=${data} setData=${setData}/>`}
      ${view==='export'&&html`<${ExportView} mapped=${mapped} stats=${stats}/>`}
      ${view==='admin'&&html`<${Admin} cfg=${cfg} setCfg=${setCfg} data=${data} setData=${setData} session=${session} pull=${pullFromCloud} push=${pushToCloud} busy=${busy}/>`}
      ${view==='anleitung'&&html`<${Anleitung}/>`}
    </main>
  </div>`;
}

  const rows=mapped.filter(m=>{
    if(klasse&&m.klasse!==klasse) return false;

    return true;

      <thead><tr><th>Klasse</th><th>Name</th><th>Geburtsdatum</th><th>alte ID</th><th>ASV-ID</th><th>Login</th><th>Status</th></tr></thead>

      </tr>`)}</tbody>
    </table></div>`}
  </div>`;
}

/* ---------- LOGIN STATUS ---------- */
function LoginStatus({data,setData,cfg}){
  const students=data.students||[];
  const loggedIn=students.filter(s=>s.login).length;
  const onCSV=(text)=>{
    const {headers,rows}=parseCSV(text);
    const iUser=col(headers,'benutzer','username','login','kürzel','kuerzel');
    const iLast=col(headers,'letzteanmeldung','lastlogin','letzterlogin','anmeldung','lastseen');
    if(iUser<0){toast('Spalte Benutzername nicht gefunden','error');return;}
    const map={}; rows.forEach(r=>{const u=(r[iUser]||'').trim().toLowerCase();if(u)map[u]={last:iLast>=0?(r[iLast]||'').trim():''};});
    // eingeloggt = es gibt einen Eintrag "letzte Anmeldung"; ohne Datum gilt als noch nicht eingeloggt
    const upd=students.map(s=>{const hit=map[(s.username||'').toLowerCase()];return hit?{...s,login:!!hit.last,last_login:hit.last}:s;});
    setData({...data,students:upd});
    toast('Login-Status aus CSV aktualisiert','success');
  };
  const tryApi=async()=>{
    if(!cfg.webuntisProxyUrl){toast('Kein Proxy-Endpunkt konfiguriert (Admin-Zentrale)','error');return;}
    toast('Frage Login-Status ab …','info');
    try{
      const res=await fetch(cfg.webuntisProxyUrl,{method:'GET'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const json=await res.json(); // erwartet: [{username,lastLogin}]
      const map={};(json||[]).forEach(x=>{if(x.username)map[String(x.username).toLowerCase()]={last:x.lastLogin||''};});
      const upd=students.map(s=>{const hit=map[(s.username||'').toLowerCase()];return hit?{...s,login:!!hit.last,last_login:hit.last}:s;});
      setData({...data,students:upd}); toast('Login-Status live aktualisiert','success');
    }catch(e){ toast('Live-Abruf fehlgeschlagen: '+e.message+' — bitte CSV-Fallback nutzen','error'); }
  };
  return html`
  <div class="main-header"><div><h1 class="main-title">Login-Status</h1><div class="main-subtitle">${loggedIn} von ${students.length} haben sich angemeldet</div></div></div>
  <div class="alert alert-warning"><b>Wichtig zur „Live-Abfrage":</b> Ein Direktabruf der WebUntis-API aus dem Browser wird i. d. R. durch CORS blockiert. Empfohlen: ein kleiner <b>Server-Proxy (Supabase Edge Function)</b>, den die App abfragt. Bis der steht, nutze den <b>CSV-Fallback</b> (WebUntis-Benutzerexport mit Spalte „letzte Anmeldung").</div>
  <${Acc} title="Woher kommt die Benutzerliste mit letzter Anmeldung?" icon="ℹ️">
    <ol>
      <li>In WebUntis (Browser) als <b>Administrator</b> anmelden.</li>
      <li><b>Administration → Benutzer</b> öffnen.</li>
      <li><b>Berichte</b> wählen und als <b>CSV</b> exportieren (gibt es als PDF/CSV/XLS).</li>
      <li>Enthalten: <b>Benutzername</b> und – je nach Version – <b>„letzte Anmeldung"</b>. Datei hier unten einlesen.</li>
    </ol>
    <div class="note">Ist keine „letzte Anmeldung"-Spalte vorhanden, hilft später der Edge-Function-Proxy. Details im Menüpunkt <b>📖 Anleitung</b>.</div>
  <//>

  <div class="card">
    <h2>Status aktualisieren</h2>
    <div class="btn-group">
      <button class="btn btn-primary" onClick=${tryApi}>🔄 Live abfragen (Proxy)</button>
      <label class="btn btn-secondary" style="cursor:pointer">📥 WebUntis-Export-CSV einlesen
        <input type="file" accept=".csv" style="display:none" onChange=${e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=()=>onCSV(r.result);r.readAsText(f,'utf-8');}}}/>
      </label>
    </div>
    <p class="muted" style="margin-top:10px">Erwartete Spalten im CSV: <code>Benutzername</code> und <code>letzte Anmeldung</code> (Bezeichnungen werden flexibel erkannt).</p>
  </div>
  <div class="card">
    <h2>Wer hat sich noch nicht angemeldet?</h2>
    ${students.length===0?html`<div class="alert alert-info">Noch keine Schülerdaten geladen.</div>`:html`
    <div class="table-wrapper"><table>
      <thead><tr><th>Klasse</th><th>Name</th><th>Benutzer</th><th>Login</th><th>letzte Anmeldung</th></tr></thead>
      <tbody>${students.slice().sort((a,b)=>(a.login-b.login)||a.klasse.localeCompare(b.klasse)).map(s=>html`<tr>
        <td>${s.klasse}</td><td>${s.last_name}, ${s.first_name}</td><td>${s.username||'—'}</td>
        <td>${s.login?html`<span class="pill pill-success">✓ eingeloggt</span>`:html`<span class="pill pill-error">offen</span>`}</td>
        <td>${s.last_login||'—'}</td>
      </tr>`)}</tbody>
    </table></div>`}
  </div>`;
}

/* ---------- IMPORT ---------- */
function ImportView({data,setData}){
  const importWebUntis=(text)=>{
    const {headers,rows}=parseCSV(text);
    const iId=col(headers,'schlüsselextern','schluesselextern','externerschlüssel','externid','externalid','id');
    const iLast=col(headers,'familienname','nachname','lastname','name');
    const iFirst=col(headers,'vorname','firstname','rufname');
    const iBirth=col(headers,'geburtsdatum','birthdate','geburt');
    const iClass=col(headers,'klasse','class');
    const iUser=col(headers,'benutzername','username','login','kürzel','kuerzel');
    const iInt=col(headers,'interneid','internalid','id');
    if(iLast<0||iFirst<0){toast('Spalten Name/Vorname nicht gefunden','error');return;}
    const students=rows.map((r,n)=>({
      webuntis_internal_id:iInt>=0?(r[iInt]||'').trim():String(n+1),
      old_external_id:iId>=0?(r[iId]||'').trim():'',
      last_name:(r[iLast]||'').trim(), first_name:(r[iFirst]||'').trim(),
      birth_date:iBirth>=0?(r[iBirth]||'').trim():'', klasse:iClass>=0?(r[iClass]||'').trim():'',
      username:iUser>=0?(r[iUser]||'').trim():'', login:false, last_login:''
    })).filter(s=>s.last_name);
    setData({...data,students});
    toast(students.length+' WebUntis-Schüler importiert','success');
  };
  const importASV=(text)=>{
    const {headers,rows}=parseCSV(text);
    const iAsv=col(headers,'asvid','schülerid','schuelerid','asv','id');
    const iOld=col(headers,'alteid','altschlüssel','altschluessel','oldid','schuldatei','altekennung');
    const iLast=col(headers,'familienname','nachname','lastname','name');
    const iFirst=col(headers,'vorname','rufname','firstname');
    const iBirth=col(headers,'geburtsdatum','birthdate','geburt');
    const iClass=col(headers,'klasse','class');
    const iE1=col(headers,'eltern1email','erziehungsberechtigte1email','eltern1mail','email1','elternemail','email');
    const iE2=col(headers,'eltern2email','erziehungsberechtigte2email','eltern2mail','email2','weitereemail');
    if(iAsv<0){toast('Spalte ASV-ID nicht gefunden','error');return;}
    const asv=rows.map(r=>({
      asv_id:(r[iAsv]||'').trim(), old_id:iOld>=0?(r[iOld]||'').trim():'',
      last_name:(r[iLast]||'').trim(), first_name:(r[iFirst]||'').trim(),
      birth_date:iBirth>=0?(r[iBirth]||'').trim():'', klasse:iClass>=0?(r[iClass]||'').trim():'',
      eltern1:iE1>=0?(r[iE1]||'').trim():'', eltern2:iE2>=0?(r[iE2]||'').trim():''
    })).filter(a=>a.asv_id);
    setData({...data,asv});
    toast(asv.length+' ASV-Datensätze importiert','success');
  };
  const fileBtn=(label,fn,accent)=>html`
    <label class=${'btn '+(accent?'btn-accent':'btn-primary')} style="cursor:pointer">${label}
      <input type="file" accept=".csv" style="display:none" onChange=${e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=()=>fn(r.result);r.readAsText(f,'utf-8');e.target.value='';}}}/>
    </label>`;
  return html`
  <div class="main-header"><div><h1 class="main-title">Daten importieren</h1><div class="main-subtitle">CSV-Dateien werden nur lokal im Browser verarbeitet – kein Upload</div></div></div>
  <${Acc} title="Woher bekomme ich diese CSV-Dateien? (WebUntis im Browser, nicht App)" icon="ℹ️">
    <h4>WebUntis-Schülerexport</h4>
    <ol>
      <li>Im <b>Browser</b> bei WebUntis als <b>Administrator</b> anmelden (nicht die Mobile-App).</li>
      <li><b>Stammdaten → Schüler*innen</b> öffnen; Feld <b>„Schlüssel (extern)"</b> (= alte ID) einblenden.</li>
      <li>Über das <b>Export-Symbol</b> als <b>CSV</b> herunterladen (Schlüssel extern, Nachname, Vorname, Geburtsdatum, Klasse, Benutzername).</li>
    </ol>
    <h4>ASV-BW-Export</h4>
    <ol><li><b>Datei → Verwaltung → Exportformatbibliothek</b>, Datenbereich <b>Schüler</b>, CSV mit <b>dauerhafter</b> ASV-ID, Name, Geburtsdatum, Klasse, Eltern-Mails.</li></ol>
    <div class="note">Volle Schritt-für-Schritt-Anleitung mit allen Klicks: Menüpunkt <b>📖 Anleitung</b>.</div>
  <//>

/* ---------- CONFLICTS ---------- */
function Conflicts({mapped,data,setData}){
  const conflicts=mapped.filter(m=>m.match_status==='conflict'||m.match_status==='missing_asv'||m.no_old_id);
  const setAsv=(internalId,val)=>{
    // store manual override in students record as asv_override
    const upd=(data.students||[]).map(s=>s.webuntis_internal_id===internalId?{...s,asv_override:val}:s);
    setData({...data,students:upd});
  };
  // apply overrides into mapped view note: buildMapping doesn't use override; we surface override here
  return html`
  <div class="main-header"><div><h1 class="main-title">Konflikte & offene Fälle</h1><div class="main-subtitle">${conflicts.length} Fälle brauchen Aufmerksamkeit</div></div></div>
  <div class="alert alert-info">Diese Schüler dürfen <b>nicht</b> in den alt→neu-Import, solange sie ungeklärt sind – sonst entstehen beim Import Neuanlagen oder Duplikate. Kläre sie manuell in ASV/WebUntis oder nimm sie aus dem Erstimport heraus.</div>
  ${conflicts.length===0?html`<div class="card"><div class="alert alert-success">Keine offenen Konflikte. 🎉</div></div>`:html`
  <div class="card"><div class="table-wrapper"><table>
    <thead><tr><th>Klasse</th><th>Name</th><th>Geburtsdatum</th><th>alte ID</th><th>Problem</th><th>manuelle ASV-ID</th></tr></thead>
    <tbody>${conflicts.map(m=>html`<tr>
      <td>${m.klasse}</td><td>${m.last_name}, ${m.first_name}</td><td>${normDate(m.birth_date)}</td>
      <td>${m.old_external_id||html`<span class="pill pill-warning">fehlt</span>`}</td>
      <td>${m.no_old_id?html`<span class="pill pill-warning">ohne alte ID → Fallback</span> `:''}
          ${m.match_status==='conflict'?html`<span class="pill pill-error">${m.match_note}</span>`:''}
          ${m.match_status==='missing_asv'?html`<span class="pill pill-warning">kein ASV-Treffer</span>`:''}</td>
      <td><input style="min-width:240px" placeholder="ASV-ID manuell eintragen" value=${(data.students.find(s=>s.webuntis_internal_id===m.webuntis_internal_id)||{}).asv_override||''} onChange=${e=>setAsv(m.webuntis_internal_id,e.target.value.trim())}/></td>
    </tr>`)}</tbody>
  </table></div>
  <p class="muted" style="margin-top:10px">Manuell eingetragene ASV-IDs fließen in den Export ein (Spalte „manuelle ASV-ID" überschreibt das automatische Ergebnis).</p>
  </div>`}`;
}

/* ---------- EXPORT ---------- */
function ExportView({mapped,stats}){
  const rowsForExport=mapped.map(m=>{
    const data=DataService.load();
    const ov=(data.students.find(s=>s.webuntis_internal_id===m.webuntis_internal_id)||{}).asv_override;
    const asv=ov||m.asv_id;
    return {...m,export_asv:asv};
  }).filter(m=>m.export_asv && m.old_external_id);
  const skipped=mapped.length-rowsForExport.length;
  const buildCSV=()=>{
    const head='old_external_id;new_external_id;last_name;first_name;birth_date;class';
    const body=rowsForExport.map(m=>[m.old_external_id,m.export_asv,m.last_name,m.first_name,normDate(m.birth_date),m.klasse].join(';')).join('\n');
    return head+'\n'+body+'\n';
  };
  return html`
  <div class="main-header"><div><h1 class="main-title">Import-CSV erzeugen</h1><div class="main-subtitle">Für den WebUntis-Schülerimport (alte ID → ASV-ID)</div></div></div>
  <div class="dash-grid">
    <div class="tile good"><div class="tile-label">im Export</div><div class="tile-value">${rowsForExport.length}</div><div class="tile-sub">bereit & mit alter ID</div></div>
    <div class=${'tile'+(skipped?' warn':'')}><div class="tile-label">nicht im Export</div><div class="tile-value">${skipped}</div><div class="tile-sub">ohne ASV-ID oder ohne alte ID</div></div>
  </div>
  <div class="card">
    <h2>Auf Knopfdruck</h2>
    <p class="muted">Die Datei enthält genau die Schüler, die sicher zugeordnet sind und eine alte ID haben. Konflikte/offene Fälle sind bewusst ausgeschlossen.</p>
    <button class="btn btn-accent" disabled=${rowsForExport.length===0} onClick=${()=>{downloadFile('webuntis_asv_id_mapping_final.csv',buildCSV());toast(rowsForExport.length+' Zeilen exportiert','success');}}>⬇️ webuntis_asv_id_mapping_final.csv herunterladen</button>
  </div>
  <div class="card">
    <h2>So importierst du die Datei in WebUntis</h2>
    <div class="kv">
      <div>old_external_id</div><div>→ Schlüssel (extern, alt)</div>
      <div>new_external_id</div><div>→ Schlüssel (extern)</div>
      <div>last_name / first_name</div><div>→ Familienname / Vorname</div>
      <div>birth_date / class</div><div>→ Geburtsdatum / Klasse</div>
      <div>Schüleridentifikation</div><div><b>Schlüssel (extern, alt)</b></div>
      <div>Zeichensatz / Trennzeichen</div><div>UTF-8 / Semikolon · erste Zeile ignorieren</div>
    </div>
    <div class="alert alert-warning" style="margin-top:14px"><b>Abbruchregel:</b> Wenn die WebUntis-Vorschau Bestandskinder als <b>Neuanlage</b> zeigt oder Duplikate warnt → Import abbrechen, nicht importieren.</div>
  </div>`;
}

/* ---------- ADMIN ---------- */

  const [tblMsg,setTblMsg]=useState('');
  const doLogin=async()=>{
    if(!emailAllowed(email)){toast('Diese E-Mail ist nicht freigegeben','error');return;}
    const {error}=await DataService.signIn(email.trim(),pw);
    if(error) toast('Login fehlgeschlagen: '+error.message,'error'); else toast('Angemeldet','success');
  };
  const doMagic=async()=>{
    if(!emailAllowed(email)){toast('Diese E-Mail ist nicht freigegeben','error');return;}
    const {error}=await DataService.magicLink(email.trim());
    if(error) toast('Fehler: '+error.message,'error'); else toast('Magic-Link gesendet — E-Mail prüfen','info');

  const checkTables=async()=>{
    try{ const ok=await DataService.tablesExist(); setTblMsg(ok?'✅ untis_-Tabellen vorhanden':'❌ untis_-Tabellen fehlen — SQL ausführen'); }

    ${session?html`
      <div class="alert alert-success">Angemeldet als <b>${session.user.email}</b>. Datenbank: <code>ooejsfixxiuobrpqgfqm</code> · Tabelle <code>untis_login_status</code>.</div>

        <button class="btn btn-secondary" disabled=${busy} onClick=${pull}>⬇️ Status laden</button>

      ${tblMsg?html`<p class="muted" style="margin-top:10px">${tblMsg}</p>`:''}

        <div class="input-group"><label>Passwort</label><input type="password" value=${pw} onInput=${e=>setPw(e.target.value)} placeholder="••••••••"/></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onClick=${doLogin}>Anmelden</button>
        <button class="btn btn-ghost" onClick=${doMagic}>Magic-Link per E-Mail</button>

    <${Acc} title="4) Fertige CSV zurück in WebUntis importieren (Kennung tauschen)" icon="⬆️">
      <h4>Wo?</h4>
      <p>In WebUntis: <b>Stammdaten → Schüler*innen</b> → Button <b>Import</b> (oben bei der Liste).</p>
      <h4>Schritt für Schritt</h4>
      <ol>
        <li>Die von dieser App erzeugte Datei <code>webuntis_asv_id_mapping_final.csv</code> hochladen.</li>
        <li>Im Zuordnungs-Bildschirm die Spalten zuweisen:
          <ul>
            <li>old_external_id → <b>Schlüssel (extern, alt)</b></li>
            <li>new_external_id → <b>Schlüssel (extern)</b></li>
            <li>last_name → Familienname · first_name → Vorname · birth_date → Geburtsdatum · class → Klasse</li>
          </ul>
        </li>
        <li>Schüleridentifikation auf <b>Schlüssel (extern, alt)</b> stellen. Zeichensatz <b>UTF-8</b>, Trennzeichen <b>Semikolon</b>, erste Zeile ignorieren.</li>
        <li><b>Vorschau genau prüfen</b> — es dürfen nur <b>Aktualisierungen</b> erscheinen.</li>
        <li><b>Abbruchregel:</b> Sobald Bestandskinder als <b>Neuanlage</b> erscheinen oder Dubletten gemeldet werden → <b>sofort abbrechen</b>, nicht importieren, und mir Bescheid geben.</li>
      </ol>
    <//>
  </div>

  <div class="card">
    <h2>Reihenfolge in der App</h2>
    <ol>
      <li><b>Daten importieren</b>: WebUntis-CSV + ASV-CSV (bleiben lokal).</li>
      <li><b>Dashboard</b>: sehen, wie viele zugeordnet sind.</li>
      <li><b>Konflikte</b>: offene Fälle klären (manuelle ASV-ID möglich).</li>
      <li><b>Import-CSV erzeugen</b>: Knopfdruck → Datei für WebUntis.</li>
      <li><b>Login-Status</b>: Benutzerliste einlesen → sehen, wer sich angemeldet hat; optional in die Cloud schreiben.</li>
    </ol>
  </div>

  <div class="card">
    <h2>Häufige Fragen</h2>
    <${Acc} title="Bleiben die Elternzugänge erhalten?" icon="❓">
      Ja – solange die Schülerdatensätze nur aktualisiert (nicht neu angelegt) werden, bleiben Eltern-Kind-Verknüpfungen inkl. Geschwister bestehen. Das ist der Grund für den ID-Tausch statt Neuanlage. (In der Testgruppe einmal praktisch bestätigen.)
    <//>
    <${Acc} title="Müssen Passwörter zurückgesetzt werden?" icon="❓">
      Nein. Es findet kein Passwort-Reset statt. Benutzernamen und Passwörter bleiben unverändert.
    <//>
    <${Acc} title="Sind die Schülerdaten sicher?" icon="❓">
      Der vollständige Datensatz bleibt lokal in deinem Browser und wird nur als Import-CSV für WebUntis ausgegeben. In die gemeinsame Cloud kommt nur der Login-Status (Benutzername, Klasse, eingeloggt ja/nein) – keine Namen, Geburtsdaten, Eltern-Mails oder IDs.
    <//>
    <${Acc} title="Was, wenn ein Kind keine alte ID hat?" icon="❓">
      Dann findet WebUntis es nicht über die alte ID. Diese Kinder erscheinen in „Konflikte" als „ohne alte ID" und werden über den Name+Geburtsdatum-Weg separat behandelt – nicht in den alt→neu-Import mischen.
    <//>
  </div>`;
}

/* ---------- PIN-GATE (einfacher Pseudo-Schutz) ---------- */
const PIN_HASH='acb13bbe8840a7b93da0a8794d56cfab9049aaf4cd63fc5b9567a18a2f3e192b';
async function sha256(s){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function PinGate({onOk}){
  const [pin,setPin]=useState(''); const [err,setErr]=useState('');
  const submit=async(e)=>{ if(e) e.preventDefault();
    const h=await sha256(pin.trim());
    if(h===PIN_HASH){ onOk(); } else { setErr('Falsche PIN'); setPin(''); }
  };
  return html`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--krs-blau-dark);padding:20px">
    <form onSubmit=${submit} style="background:#fff;padding:32px;border-radius:16px;box-shadow:var(--shadow-lg);width:300px;max-width:100%;text-align:center">
      <div class="logo-badge" style="margin-bottom:16px"><span class="k">K</span><span class="r">R</span><span class="s">S</span></div>
      <h2 style="margin:0 0 4px;font-size:18px">Untis-Migrations-Zentrale</h2>
      <p class="muted" style="margin:0 0 16px;font-size:13px">Bitte PIN eingeben</p>
      <input type="password" inputmode="numeric" autofocus value=${pin} onInput=${e=>{setPin(e.target.value);setErr('');}} placeholder="PIN" style="text-align:center;letter-spacing:6px;font-size:20px"/>
      ${err?html`<div class="pill pill-error" style="margin-top:10px;display:inline-block">${err}</div>`:''}
      <button class="btn btn-primary btn-full" style="margin-top:16px" type="submit">Entsperren</button>
    </form>
  </div>`;
}
function Root(){
  const [ok,setOk]=useState(()=>{ try{return sessionStorage.getItem('untis_pin_ok')==='1';}catch(e){return false;} });
  if(!ok) return html`<${PinGate} onOk=${()=>{ try{sessionStorage.setItem('untis_pin_ok','1');}catch(e){} setOk(true); }}/>`;
  return html`<${App}/>`;
}
render(html`<${Root}/>`, document.getElementById('root'));
</script>
